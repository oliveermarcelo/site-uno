const Reveal = ({children,delay=0,style={},direction="up"}) => {
  const ref = useRef(null);
  useEffect(()=>{
    if(typeof gsap==="undefined"||!ref.current)return;
    const dirs={up:{y:40},down:{y:-40},left:{x:-50},right:{x:50}};
    const from={opacity:0,...dirs[direction]};
    gsap.fromTo(ref.current,from,{opacity:1,x:0,y:0,duration:0.85,delay,ease:"power3.out",scrollTrigger:{trigger:ref.current,start:"top 88%",toggleActions:"play none none none"}});
  },[]);
  return <div ref={ref} style={{...style}}>{children}</div>;
};

                <button onClick={()=>setOpen(open===i?null:i)} style={{width:"100%",padding:"20px 22px",background:"none",border:"none",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",gap:12,textAlign:"left"}}>
                  <span style={{fontFamily:F.b,fontSize:15,fontWeight:700,color:C.black,lineHeight:1.4}}>{f.q}</span>
                  <ChevronDown size={16} color={open===i?C.orange:C.gray400} style={{flexShrink:0,transition:"transform .2s",transform:open===i?"rotate(180deg)":"none"}}/>
                </button>
                {open===i&&(
                  <div style={{padding:"0 22px 20px"}}>
                    <p style={{fontFamily:F.b,fontSize:14,color:C.gray500,lineHeight:1.7}}>{f.a}</p>
                  </div>
                )}
              </div>
            </Reveal>
          ))}
        </div>
      </div>
    </section>
  );
};
