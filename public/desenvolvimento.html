*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:#FDFCFA;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:rgba(255,95,0,.12);color:#0D0D0D}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#f8f8f6}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#FF5F00}
input::placeholder{color:#bbb}
select{appearance:none}
@keyframes ddIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes heroFadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes typeIn{from{width:0;opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes progressFill{from{width:0}to{width:var(--w)}}

@media(max-width:900px){
  .nav-links{display:none!important}
  .nav-mobile-btn{display:flex!important}
  .hero-section{padding:100px 16px 56px!important}
  .hero-grid{grid-template-columns:1fr!important;gap:32px!important}
  .hero-grid h1{font-size:32px!important;letter-spacing:-1px!important}
  .feat-grid{grid-template-columns:1fr 1fr!important}
  .diff-grid{grid-template-columns:1fr!important;gap:24px!important}
  .steps-row{grid-template-columns:1fr 1fr!important;gap:20px!important}
  .team-grid{grid-template-columns:1fr 1fr!important}
  .stats-row{grid-template-columns:1fr 1fr!important}
  .faq-cols{grid-template-columns:1fr!important}
  .cta-grid{grid-template-columns:1fr!important;gap:32px!important}
  .footer-grid{grid-template-columns:1fr 1fr!important;gap:24px!important}
  section:not(.hero-section){padding:56px 16px!important}
  h2{font-size:28px!important}
}
@media(max-width:560px){
  .hero-section{padding:96px 16px 48px!important}
  .feat-grid{grid-template-columns:1fr!important}
  .steps-row{grid-template-columns:1fr!important}
  .team-grid{grid-template-columns:1fr!important}
  .stats-row{grid-template-columns:1fr!important}
  .footer-grid{grid-template-columns:1fr!important}
}
</style>

if(typeof gsap!=="undefined"&&typeof ScrollTrigger!=="undefined"){gsap.registerPlugin(ScrollTrigger);}

const Reveal = ({children,delay=0,style={},direction="up"}) => {
  const ref = useRef(null);
  useEffect(()=>{
    if(typeof gsap==="undefined"||!ref.current)return;
    const dirs={up:{y:40},down:{y:-40},left:{x:-50},right:{x:50}};
    const from={opacity:0,...dirs[direction]};
    gsap.fromTo(ref.current,from,{opacity:1,x:0,y:0,duration:0.85,delay,ease:"power3.out",scrollTrigger:{trigger:ref.current,start:"top 88%",toggleActions:"play none none none"}});
  },[]);
  return <div ref={ref} style={{...style}}>{children}</div>;
};

            <Badge>Solicitar Orçamento</Badge>
            <h2 style={{fontFamily:F.h,fontSize:42,fontWeight:900,color:C.white,letterSpacing:-1.5,marginBottom:14}}>

              <span style={{color:C.orange}}>Desenvolvemos para você.</span>
            </h2>
            <p style={{fontFamily:F.b,fontSize:17,color:"rgba(255,255,255,.4)",maxWidth:460,margin:"0 auto"}}>
              Conte o que precisa. Nosso consultor entra em contato para um levantamento sem compromisso.
            </p>
          </div>
        </Reveal>
        <div className="cta-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:48,alignItems:"start"}}>
          <Reveal direction="left">
            <div>
              <div style={{fontFamily:F.h,fontSize:20,fontWeight:800,color:C.white,marginBottom:24}}>O que você recebe:</div>
              <div style={{display:"flex",flexDirection:"column",gap:16,marginBottom:36}}>
                {benefits.map((b,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:14}}>
                    <div style={{width:40,height:40,borderRadius:12,background:"rgba(255,95,0,.1)",border:"1px solid rgba(255,95,0,.2)",color:C.orange,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{b.ic}</div>
                    <span style={{fontFamily:F.b,fontSize:14,color:"rgba(255,255,255,.65)"}}>{b.t}</span>
                  </div>
                ))}
              </div>
              {/* Methodologies badge row */}
              <div style={{padding:"20px 22px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:16}}>
                <div style={{fontFamily:F.b,fontSize:11,fontWeight:700,color:"rgba(255,255,255,.25)",textTransform:"uppercase",letterSpacing:2,marginBottom:12}}>Metodologias utilizadas</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {["PMBOK","UML","Scrum","Clean Code","CI/CD","Code Review"].map((m,i)=>(
                    <span key={i} style={{fontFamily:F.mono,fontSize:11,color:"rgba(255,255,255,.5)",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",padding:"4px 10px",borderRadius:6}}>{m}</span>
                  ))}
                </div>
              </div>
            </div>
          </Reveal>
          <Reveal direction="right">
            <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:20,padding:"36px 32px",backdropFilter:"blur(12px)"}}>
              {sent?(
                <div style={{textAlign:"center",padding:"32px 0"}}>
                  <div style={{width:64,height:64,borderRadius:"50%",background:"rgba(255,95,0,.1)",border:"2px solid rgba(255,95,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px"}}><Check size={28} color={C.orange}/></div>
                  <div style={{fontFamily:F.h,fontSize:20,fontWeight:800,color:C.white,marginBottom:8}}>Solicitação enviada!</div>
                  <div style={{fontFamily:F.b,fontSize:14,color:"rgba(255,255,255,.4)",lineHeight:1.6}}>Nossa equipe entrará em contato em até 1 dia útil para iniciar o levantamento de requisitos.</div>
                </div>
              ):(
                <>
                  <div style={{fontFamily:F.h,fontSize:18,fontWeight:800,color:C.white,marginBottom:4}}>Solicite um orçamento</div>
                  <div style={{fontFamily:F.b,fontSize:13,color:"rgba(255,255,255,.3)",marginBottom:24}}>Preencha e um consultor entra em contato.</div>
                  <form onSubmit={handle} style={{display:"flex",flexDirection:"column",gap:12}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                      <input style={inp} placeholder="Nome completo" value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})} required
                        onFocus={e=>e.target.style.borderColor="rgba(255,95,0,.5)"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.12)"}/>
                      <input style={inp} placeholder="E-mail corporativo" type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} required
                        onFocus={e=>e.target.style.borderColor="rgba(255,95,0,.5)"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.12)"}/>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                      <input style={inp} placeholder="Telefone / WhatsApp" value={form.telefone} onChange={e=>setForm({...form,telefone:e.target.value})}
                        onFocus={e=>e.target.style.borderColor="rgba(255,95,0,.5)"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.12)"}/>
                      <input style={inp} placeholder="Empresa" value={form.empresa} onChange={e=>setForm({...form,empresa:e.target.value})} required
                        onFocus={e=>e.target.style.borderColor="rgba(255,95,0,.5)"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.12)"}/>
                    </div>
                    <div style={{position:"relative"}}>
                      <select style={{...inp,cursor:"pointer",paddingRight:36}} value={form.necessidade} onChange={e=>setForm({...form,necessidade:e.target.value})} required
                        onFocus={e=>e.target.style.borderColor="rgba(255,95,0,.5)"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,.12)"}>
                        <option value="" disabled>Tipo de desenvolvimento</option>
                        <option>Novas telas / módulos</option>
                        <option>Integração por API</option>
                        <option>Relatórios e dashboards</option>
                        <option>App mobile</option>
                        <option>Portal / site B2B ou B2C</option>
                        <option>Automação de processo</option>
                        <option>Outro</option>
                      </select>
                      <ChevronDown size={14} color="rgba(255,255,255,.4)" style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}/>
                    </div>
                    <button type="submit" style={{marginTop:4,padding:"14px",background:C.orange,border:"none",borderRadius:10,fontFamily:F.b,fontSize:14,fontWeight:700,color:C.white,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all .2s"}}
                      onMouseEnter={e=>e.currentTarget.style.background=C.orangeHot} onMouseLeave={e=>e.currentTarget.style.background=C.orange}>
                      <Code size={16}/>Solicitar levantamento gratuito
                    </button>
                  </form>
                </>
              )}
            </div>
          </Reveal>
        </div>
      </div>
    </section>
  );
};
