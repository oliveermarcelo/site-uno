const Reveal = ({children,delay=0,style={},direction="up"}) => {
  const ref = useRef(null);
  useEffect(()=>{
    if(typeof gsap==="undefined"||!ref.current)return;
    const dirs={up:{y:36},left:{x:-40},right:{x:40}};
    const from={opacity:0,...(dirs[direction]||dirs.up)};
    gsap.fromTo(ref.current,from,{opacity:1,x:0,y:0,duration:0.8,delay,ease:"power3.out",scrollTrigger:{trigger:ref.current,start:"top 88%",toggleActions:"play none none none"}});
  },[]);
  return <div ref={ref} style={style}>{children}</div>;
};

  const colors = ["#FF5F00","#2563eb","#7c3aed","#059669","#d97706","#dc2626","#0891b2","#be185d"];
  const idx = (item.name||"").split("").reduce((a,c)=>a+c.charCodeAt(0),0) % colors.length;

    ? <img src={url} alt={item.name} style={{width:size,height:size,objectFit:"contain",borderRadius:radius,border:`1px solid ${C.gray100}`,background:C.white,padding:4}}/>
    : <div style={{width:size,height:size,borderRadius:radius,background:colors[idx],display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>

};

const FeaturedCarousel = ({integrations, plugins}) => {
  const real = [
    ...integrations.filter(i=>i.featured).map(i=>({...i,_type:"integration"})),
    ...plugins.filter(p=>p.featured).map(p=>({...p,_type:"plugin"})),
  ];
  const n = real.length;
  if(n===0) return null;

  /* ── infinite-loop: clone 4 items on each side ── */
  const CLONE = Math.min(4, n);
  const items = [
    ...real.slice(-CLONE).map((x,i)=>({...x,_key:`pre${i}`})),
    ...real.map((x,i)=>({...x,_key:`real${i}`})),
    ...real.slice(0,CLONE).map((x,i)=>({...x,_key:`post${i}`})),
  ];

  /* raw position starts at first real card */
  const [raw, setRaw]       = useState(CLONE);
  const [anim, setAnim]     = useState(true);
  const [paused, setPaused] = useState(false);
  const trackRef            = useRef(null);

  /* real index for dots */
  const realIdx = ((raw - CLONE) % n + n) % n;

  /* after slide ends, silently jump if we're on a clone */
  const onTransitionEnd = useCallback(()=>{
    if(raw < CLONE){
      setAnim(false);
      setRaw(raw + n);
    } else if(raw >= CLONE + n){
      setAnim(false);
      setRaw(raw - n);
    }
  },[raw, n, CLONE]);

  /* re-enable anim on next frame after silent jump */
  useEffect(()=>{
    if(!anim){
      const id = requestAnimationFrame(()=>requestAnimationFrame(()=>setAnim(true)));
      return ()=>cancelAnimationFrame(id);
    }
  },[anim]);

  /* auto-advance */
  useEffect(()=>{
    if(paused||n<2) return;
    const t = setInterval(()=>setRaw(r=>r+1), 3800);
    return ()=>clearInterval(t);
  },[paused,n]);

  const prev   = ()=>{ setAnim(true); setRaw(r=>r-1); };
  const next   = ()=>{ setAnim(true); setRaw(r=>r+1); };
  const goTo   = (i)=>{ setAnim(true); setRaw(i+CLONE); };

  /* progress bar — remount on realIdx change so animation restarts */
  const barKey = realIdx;

  return (
    <section style={{background:"linear-gradient(180deg,#0c0b09 0%,#110d06 100%)",padding:"64px 0 56px",overflow:"hidden",position:"relative"}}
      onMouseEnter={()=>setPaused(true)} onMouseLeave={()=>setPaused(false)}>
      {/* ambient glow */}
      <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:900,height:360,background:"radial-gradient(ellipse,rgba(255,95,0,.07) 0%,transparent 65%)",pointerEvents:"none"}}/>

      {/* Header row */}
      <div style={{maxWidth:1240,margin:"0 auto",padding:"0 40px",display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:36,gap:16,flexWrap:"wrap"}}>
        <div>
          <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(255,95,0,.08)",border:"1px solid rgba(255,95,0,.2)",borderRadius:50,padding:"4px 14px",marginBottom:12}}>
            <Star size={11} color={C.orange} style={{fill:C.orange,stroke:"none"}}/>
            <span style={{fontFamily:F.b,fontSize:11,fontWeight:700,color:C.orange,letterSpacing:1.2}}>DESTAQUES</span>
          </div>
          <h2 style={{fontFamily:F.h,fontSize:30,fontWeight:900,color:C.white,letterSpacing:-1,lineHeight:1.1}}>Os mais populares</h2>
          <p style={{fontFamily:F.b,fontSize:14,color:"rgba(255,255,255,.3)",marginTop:6}}>Integrações e plugins mais usados pelos nossos clientes</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {/* progress dots */}
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {real.map((_,i)=>(
              <button key={i} onClick={()=>goTo(i)}
                style={{width:i===realIdx?20:6,height:6,borderRadius:3,border:"none",cursor:"pointer",padding:0,
                  background:i===realIdx?C.orange:"rgba(255,255,255,.15)",
                  transition:"all .4s cubic-bezier(.22,1,.36,1)",position:"relative",overflow:"hidden"}}>
                {i===realIdx&&!paused&&<div key={barKey} style={{position:"absolute",inset:0,background:"rgba(255,255,255,.4)",borderRadius:3,animation:"shrink 3.8s linear forwards"}}/>}
              </button>
            ))}
          </div>
          {/* arrows */}
          <div style={{display:"flex",gap:8}}>
            {[{fn:prev,d:"m15 18-6-6 6-6"},{fn:next,d:"m9 18 6-6-6-6"}].map(({fn,d},k)=>(
              <button key={k} onClick={fn}
                style={{width:40,height:40,borderRadius:10,border:"1px solid rgba(255,255,255,.1)",background:"rgba(255,255,255,.04)",cursor:"pointer",color:"rgba(255,255,255,.6)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}
                onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,95,0,.12)";e.currentTarget.style.borderColor="rgba(255,95,0,.35)";e.currentTarget.style.color=C.orange;}}
                onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,.04)";e.currentTarget.style.borderColor="rgba(255,255,255,.1)";e.currentTarget.style.color="rgba(255,255,255,.6)";}}>
                <svg width={15} height={15} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.2} strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Track */}
      <div style={{overflow:"hidden"}}>
        <div style={{paddingLeft:"max(40px, calc((100vw - 1240px)/2 + 40px))"}}>
          <div ref={trackRef} onTransitionEnd={onTransitionEnd}
            style={{display:"flex",gap:CARD_G,
              transition:anim?"transform .6s cubic-bezier(.22,1,.36,1)":"none",
              transform:`translateX(${-raw*(CARD_W+CARD_G)}px)`}}>
            {items.map((item,i)=>(
              <CarouselCard key={item._key} item={item} act={i===raw}
                onClick={()=>{ const r=i-CLONE; if(r>=0&&r<n) goTo(r); }}/>
            ))}
            <div style={{flexShrink:0,width:40}}/>
          </div>
        </div>
      </div>
      <style>{`@keyframes shrink{from{transform-origin:left;transform:scaleX(1)}to{transform-origin:left;transform:scaleX(0)}}`}</style>
    </section>
  );
};

                      <button type="submit" style={{marginTop:4,padding:"13px",background:C.orange,border:"none",borderRadius:9,fontFamily:F.b,fontSize:14,fontWeight:700,color:C.white,cursor:"pointer",transition:"all .2s"}}
                        onMouseEnter={e=>e.currentTarget.style.background=C.orangeHot} onMouseLeave={e=>e.currentTarget.style.background=C.orange}>
                        Solicitar desenvolvimento
                      </button>
                    </form>
                  </>
                )}
              </div>
            </Reveal>
          </div>
        </div>
      </section>

      {/* ── FOOTER ── */}
      <footer style={{background:C.black,padding:"56px 40px 28px"}}>
        <div style={{maxWidth:1240,margin:"0 auto"}}>
          <div className="footer-grid" style={{display:"grid",gridTemplateColumns:"1.6fr 1fr 1fr 1fr 1.2fr",gap:32,marginBottom:48}}>
            <div>
              <div style={{marginBottom:14}}><Logo height={36}/></div>
              <p style={{fontFamily:F.b,fontSize:13,color:"rgba(255,255,255,.3)",lineHeight:1.7,maxWidth:220}}>Mais de 20 anos transformando a gestão de PMEs brasileiras com tecnologia e inteligência artificial.</p>
              <div style={{display:"flex",gap:16,marginTop:16}}>
                {[<Mail size={16}/>,<Phone size={16}/>,<MapPin size={16}/>].map((ic,i)=>(
                  <div key={i} style={{width:32,height:32,borderRadius:8,background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,.35)",cursor:"pointer",transition:"all .2s"}}
                    onMouseEnter={e=>{e.currentTarget.style.color=C.orange;e.currentTarget.style.borderColor="rgba(255,95,0,.3)";}}
                    onMouseLeave={e=>{e.currentTarget.style.color="rgba(255,255,255,.35)";e.currentTarget.style.borderColor="rgba(255,255,255,.06)";}}>
                    {ic}
                  </div>
                ))}
              </div>
            </div>
            {[
              {t:"Soluções",ls:["Sistema de Gestão","CRM","IAU — IA","BI (Google)","App Mobile","WMS","M-Commerce"]},
              {t:"Segmentos",ls:["Indústria","Distribuição","Serviços","Cosméticos","Alimentos","Química","Metalúrgica"]},
              {t:"Empresa",ls:["Sobre","Blog","Planos","Integrações","Desenvolvimento","Suporte","Contato"]},
            ].map((col,i)=>(
              <div key={i}>
                <div style={{fontFamily:F.b,fontSize:11,fontWeight:700,color:"rgba(255,255,255,.2)",textTransform:"uppercase",letterSpacing:2,marginBottom:16}}>{col.t}</div>
                {col.ls.map((l,j)=>(
                  <a key={j} href="#" style={{display:"block",fontFamily:F.b,fontSize:13,color:"rgba(255,255,255,.4)",textDecoration:"none",marginBottom:9,transition:"color .15s"}}
                    onMouseEnter={e=>e.target.style.color=C.orange} onMouseLeave={e=>e.target.style.color="rgba(255,255,255,.4)"}>{l}</a>
                ))}
              </div>
            ))}
            <div>
              <div style={{fontFamily:F.b,fontSize:11,fontWeight:700,color:"rgba(255,255,255,.2)",textTransform:"uppercase",letterSpacing:2,marginBottom:16}}>Newsletter</div>
              <p style={{fontFamily:F.b,fontSize:13,color:"rgba(255,255,255,.3)",lineHeight:1.6,marginBottom:12}}>Receba dicas de gestão e novidades do UNO ERP.</p>
              <input type="email" placeholder="Seu e-mail" style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,.1)",background:"rgba(255,255,255,.04)",fontFamily:F.b,fontSize:13,color:C.white,outline:"none",marginBottom:8,boxSizing:"border-box"}}/>
              <button style={{width:"100%",padding:"10px 0",borderRadius:8,border:"none",background:C.orange,color:C.white,fontFamily:F.b,fontSize:13,fontWeight:700,cursor:"pointer"}}>Inscrever-se</button>
            </div>
          </div>
          <div style={{borderTop:"1px solid rgba(255,255,255,.06)",paddingTop:20,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
            <span style={{fontFamily:F.b,fontSize:12,color:"rgba(255,255,255,.18)"}}>© 2025 UNO ERP · Todos os direitos reservados.</span>
            <div style={{display:"flex",gap:20}}>
              {["Política de Privacidade","Termos e Condições"].map((t,i)=>(
                <a key={i} href="#" style={{fontFamily:F.b,fontSize:12,color:"rgba(255,255,255,.18)",textDecoration:"none"}}>{t}</a>
              ))}
            </div>
          </div>
        </div>
      </footer>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
