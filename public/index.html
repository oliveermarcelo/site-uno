<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNO ERP — ERP com IA. Sua empresa um passo à frente.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:#FDFCFA;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:rgba(255,95,0,.12);color:#0D0D0D}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#f8f8f6}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#FF5F00}
input::placeholder{color:#bbb}
@keyframes heroPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.3);opacity:1}}
@keyframes ddIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
@keyframes blink{50%{opacity:0}}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes floatDown{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
@keyframes heroFadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
@keyframes dataFlow{0%{stroke-dashoffset:60}100%{stroke-dashoffset:0}}
@keyframes nodeGlow{0%,100%{opacity:.25;r:3}50%{opacity:.7;r:5}}
@keyframes cardGlow{0%,100%{box-shadow:0 0 0 1px rgba(255,95,0,.4),0 0 20px rgba(255,95,0,.1)}50%{box-shadow:0 0 0 1px rgba(255,95,0,.65),0 0 36px rgba(255,95,0,.22)}}
@keyframes orbitRing{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes floatBrain{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-5px) scale(1.04)}}
@keyframes heroDashIn{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:none}}
@keyframes heroPopIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}

.hero-badge{animation:heroFadeUp .8s ease both;animation-delay:.2s}
.hero-line-1{animation:heroFadeUp .8s ease both;animation-delay:.4s}
.hero-line-2{animation:heroFadeUp .8s ease both;animation-delay:.6s}
.hero-typing{animation:heroFadeUp .8s ease both;animation-delay:.8s}
.hero-desc{animation:heroFadeUp .8s ease both;animation-delay:.9s}
.hero-cta{animation:heroFadeUp .7s ease both}
.hero-cta:nth-child(1){animation-delay:1s}
.hero-cta:nth-child(2){animation-delay:1.1s}
.hero-trust{animation:heroFadeUp .6s ease both;animation-delay:1.2s}
.hero-dashboard{animation:heroDashIn 1s ease both;animation-delay:.5s}

/* ═══════════ RESPONSIVE ═══════════ */
@media (max-width: 900px) {
  /* Nav */
  .nav-links { display: none !important; }
  .nav-mobile-btn { display: flex !important; }
  
  /* Hero */
  .hero-grid { grid-template-columns: 1fr !important; gap: 32px !important; padding: 100px 16px 56px !important; }
  .hero-left-col h1 { font-size: 36px !important; }
  .hero-typing span { font-size: 20px !important; }
  .hero-left-col p { font-size: 15px !important; }
  .hero-dashboard { max-width: 100% !important; }
  .hero-float-card { display: none !important; }
  .hero-cta { padding: 12px 24px !important; font-size: 14px !important; }
  .hero-trust { gap: 16px !important; flex-wrap: wrap !important; }

  /* Sections global (not hero) */
  section:not(:first-of-type) { padding: 56px 16px !important; }
  
  /* Grids → 1 col */
  .grid-3 { grid-template-columns: 1fr !important; }
  .grid-2 { grid-template-columns: 1fr !important; }
  .grid-2-auto { grid-template-columns: 1fr !important; }
  
  /* Module pills */
  .mod-pills { 
    flex-wrap: nowrap !important; 
    overflow-x: auto !important; 
    justify-content: flex-start !important;
    gap: 6px !important;
    padding: 0 0 10px !important;
    margin-left: -16px !important;
    margin-right: -16px !important;
    padding-left: 16px !important;
    padding-right: 16px !important;
    -webkit-overflow-scrolling: touch;
  }
  .mod-pills::-webkit-scrollbar { display: none; }
  .mod-pills button { 
    padding: 8px 16px !important; 
    font-size: 12px !important; 
    white-space: nowrap !important;
    flex-shrink: 0 !important;
  }
  .mod-panel-header { 
    flex-direction: column !important; 
    gap: 16px !important; 
    padding: 20px 16px !important;
    align-items: flex-start !important;
  }
  .mod-panel-header > svg { display: none !important; }
  .mod-features { 
    grid-template-columns: 1fr !important;
    gap: 8px !important;
  }
  .mod-features > div {
    padding: 12px 14px !important;
  }
  .mod-footer { 
    flex-direction: column !important; 
    gap: 12px !important; 
    align-items: flex-start !important; 
    padding: 16px !important;
    padding-top: 20px !important;
  }
  .mod-footer a {
    width: 100% !important;
    justify-content: center !important;
  }
  .mod-panel {
    border-radius: 16px !important;
    margin: 0 -8px !important;
  }
  .mod-features-wrap {
    padding: 16px !important;
  }
  
  /* Mobile app phones */
  .phones-container { height: 360px !important; }
  .phone-left, .phone-right { display: none !important; }
  .phone-center { position: relative !important; left: auto !important; top: auto !important; transform: none !important; width: 240px !important; margin: 0 auto !important; }
  .mobile-features { grid-template-columns: 1fr !important; }
  
  /* IAU */
  .iau-grid { grid-template-columns: 1fr !important; }
  .iau-visual { margin-top: 24px !important; }
  
  /* CTA */
  .cta-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
  
  /* Footer */
  .footer-grid { grid-template-columns: 1fr 1fr !important; gap: 24px !important; }
  
  /* Mega menu */
  .mega-menu { left: -20px !important; right: -20px !important; min-width: auto !important; }
  .mega-grid { grid-template-columns: 1fr !important; }
  
  /* Headings */
  h2 { font-size: 28px !important; }
  
  /* Marquee */
  .marquee-strip { padding: 10px 0 !important; }
  .marquee-strip span { font-size: 11px !important; padding: 0 16px !important; }
  
  /* Partners */
  .partners-row { gap: 24px !important; }
  .partners-row span { font-size: 14px !important; }
  
  /* Services */
  .service-card-img { height: 120px !important; }
  
  /* Blog */
  .blog-thumb { height: 140px !important; }
}

@media (max-width: 480px) {
  .hero-grid { padding: 96px 16px 48px !important; }
  .hero-left-col h1 { font-size: 30px !important; }
  .hero-btns { flex-direction: column !important; }
  .hero-btns a { width: 100% !important; justify-content: center !important; }
  .footer-grid { grid-template-columns: 1fr !important; }
  .mod-pills { flex-wrap: nowrap !important; overflow-x: auto !important; justify-content: flex-start !important; padding-bottom: 8px !important; }
  .mod-pills::-webkit-scrollbar { display: none; }
}

/* Journey section */
.journey-flow { display: flex; gap: 20px; align-items: flex-start; }

@media (max-width: 900px) {
  .journey-section-pad { padding: 60px 20px 52px !important; }
  .journey-flow { flex-direction: column !important; gap: 0 !important; }
  .journey-step-col { flex-direction: row !important; align-items: flex-start !important; gap: 14px !important; width: 100% !important; }
  .journey-step-circle { flex-shrink: 0 !important; }
  .journey-step-connector-v { display: flex !important; }
  .journey-step-card { flex: 1 !important; margin-top: 0 !important; }
  .journey-h-line { display: none !important; }
  .journey-ai-label { display: none !important; }
  .journey-section-pad h2 { font-size: clamp(24px,7vw,34px) !important; letter-spacing: -1px !important; }
  .journey-tagline { font-size: 14.5px !important; }
  .journey-neural-svg { display: none !important; }
}

@media (max-width: 480px) {
  .journey-section-pad { padding: 48px 16px 44px !important; }
  .journey-card { padding: 14px 13px 16px !important; }
  .journey-brain-lg { transform: scale(0.68) !important; }
}
</style>
</head>

};

const Reveal = ({ children, delay = 0, style = {}, direction = "up" }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (typeof gsap === "undefined" || !ref.current) return;
    const dirs = { up: { y: 50 }, down: { y: -50 }, left: { x: -60 }, right: { x: 60 } };
    const from = { opacity: 0, ...dirs[direction] };
    gsap.fromTo(ref.current, from, {
      opacity: 1, x: 0, y: 0, duration: 0.9, delay,
      ease: "power3.out",
      scrollTrigger: { trigger: ref.current, start: "top 88%", toggleActions: "play none none none" }
    });
  }, []);
  return <div ref={ref} style={{ ...style }}>{children}</div>;
};

/* ═══════════ HERO — GSAP CINEMATIC AI-FIRST ═══════════ */
const Hero = () => {
  const heroRef = useRef(null);
  const canvasRef = useRef(null);

  // Typing effect
  const [typed, setTyped] = useState("");
  const words = ["Gestão completa.", "IA que antecipa.", "Estoque preciso.", "Vendas que escalam.", "Produção eficiente."];
  const [wI, setWI] = useState(0), [cI, setCI] = useState(0), [del, setDel] = useState(false);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    if (!ready) return;
    const w = words[wI], spd = del ? 60 : 120;
    const t = setTimeout(() => {
      if (!del && cI < w.length) { setTyped(w.slice(0, cI + 1)); setCI(cI + 1); }
      else if (!del && cI === w.length) setTimeout(() => setDel(true), 2500);
      else if (del && cI > 0) { setTyped(w.slice(0, cI - 1)); setCI(cI - 1); }
      else { setDel(false); setWI((wI + 1) % words.length); }
    }, spd);
    return () => clearTimeout(t);
  }, [cI, del, wI, ready]);

  // Canvas neural network
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let animId;
    let w, h;
    const resize = () => {
      const dpr = window.devicePixelRatio || 1;
      w = canvas.offsetWidth; h = canvas.offsetHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      ctx.scale(dpr, dpr);
    };
    resize(); window.addEventListener("resize", resize);
    const particles = Array.from({ length: 45 }, () => ({
      x: Math.random() * 2000, y: Math.random() * 1200,
      r: Math.random() * 2 + 0.5, vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2,
    }));
    let time = 0;
    const draw = () => {
      ctx.clearRect(0, 0, w, h); time += 0.004;
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      });
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 150) {
            ctx.strokeStyle = `rgba(255,95,0,${(1 - dist / 150) * 0.15})`;
            ctx.lineWidth = 0.6; ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
          }
        }
      }
      particles.forEach(p => {
        ctx.fillStyle = "rgba(255,95,0,0.06)"; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 3.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "rgba(255,120,30,0.4)"; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
      });
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animId); window.removeEventListener("resize", resize); };
  }, []);

  // Start typing immediately
  useEffect(() => { setReady(true); }, []);

  // Hero parallax on scroll (only GSAP usage)
  useEffect(() => {
    if (typeof gsap === "undefined") return;
    const ctx = gsap.context(() => {
      gsap.to(".hero-left-col", {
        y: -80, opacity: 0,
        scrollTrigger: { trigger: heroRef.current, start: "top top", end: "60% top", scrub: true }
      });
      gsap.to(".hero-dashboard", {
        y: -30,
        scrollTrigger: { trigger: heroRef.current, start: "top top", end: "60% top", scrub: true }
      });
      gsap.to(".hero-orb", {
        y: -50,
        scrollTrigger: { trigger: heroRef.current, start: "top top", end: "bottom top", scrub: true }
      });
    }, heroRef);
    return () => ctx.revert();
  }, []);

  return (
    <section ref={heroRef} style={{ position: "relative", overflow: "hidden", minHeight: "100vh" }}>
      {/* === BACKGROUND LAYERS === */}
      <div style={{ position: "absolute", inset: 0, zIndex: 0 }}>
        <div className="hero-gradient" style={{ position: "absolute", inset: 0, background: "linear-gradient(135deg, #1a0f05 0%, #0f0f0f 35%, #0d0d0d 60%, #110a04 100%)" }} />
        <div className="hero-bg-grid" style={{ position: "absolute", inset: 0, opacity: 0.035, backgroundImage: "linear-gradient(rgba(255,95,0,1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,95,0,1) 1px, transparent 1px)", backgroundSize: "60px 60px" }} />
        <canvas ref={canvasRef} className="hero-canvas" style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }} />

        {/* Orbs */}
