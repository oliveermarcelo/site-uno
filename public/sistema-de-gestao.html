*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:#FDFCFA;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:rgba(255,95,0,.12);color:#0D0D0D}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#f8f8f6}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#FF5F00}
input::placeholder{color:#bbb}
select{appearance:none}
@keyframes ddIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
@keyframes blink{50%{opacity:0}}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes floatDown{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
@keyframes heroFadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Responsive */
@media(max-width:900px){
  .nav-links{display:none!important}
  .nav-mobile-btn{display:flex!important}
  .hero-section{padding:100px 16px 56px!important}
  .page-hero-grid{grid-template-columns:1fr!important;gap:32px!important}
  .page-hero-grid h1{font-size:34px!important}
  .stats-row{grid-template-columns:1fr 1fr!important}
  .mod-pills{flex-wrap:nowrap!important;overflow-x:auto!important;justify-content:flex-start!important;gap:6px!important;padding:0 0 10px!important;margin-left:-16px!important;margin-right:-16px!important;padding-left:16px!important;padding-right:16px!important;-webkit-overflow-scrolling:touch}
  .mod-pills::-webkit-scrollbar{display:none}
  .mod-pills button{padding:8px 16px!important;font-size:12px!important;white-space:nowrap!important;flex-shrink:0!important}
  .mod-panel-header{flex-direction:column!important;gap:16px!important;padding:20px 16px!important;align-items:flex-start!important}
  .mod-panel-header>svg{display:none!important}
  .mod-features{grid-template-columns:1fr!important;gap:8px!important}
  .mod-features>div{padding:12px 14px!important}
  .mod-features-wrap{padding:16px!important}
  .mod-footer{flex-direction:column!important;gap:12px!important;align-items:flex-start!important;padding:16px!important}
  .mod-panel{border-radius:16px!important;margin:0 -8px!important}
  .why-grid{grid-template-columns:1fr!important}
  .diff-grid{grid-template-columns:1fr!important}
  .int-grid{grid-template-columns:1fr!important;gap:32px!important}
  .seg-grid{grid-template-columns:1fr 1fr!important}
  .cta-grid{grid-template-columns:1fr!important;gap:32px!important}
  .footer-grid{grid-template-columns:1fr 1fr!important;gap:24px!important}
  section:not(.hero-section){padding:56px 16px!important}
  h2{font-size:28px!important}
  .marquee-strip{padding:10px 0!important}
}
@media(max-width:480px){
  .hero-section{padding:96px 16px 48px!important}
  .stats-row{grid-template-columns:1fr!important}
  .seg-grid{grid-template-columns:1fr 1fr!important}
  .footer-grid{grid-template-columns:1fr!important}
}
</style>

const useMobile = (bp=900) => {
  const [m,setM] = useState(window.innerWidth<=bp);
  useEffect(()=>{const fn=()=>setM(window.innerWidth<=bp);window.addEventListener("resize",fn);return()=>window.removeEventListener("resize",fn);},[]);
  return m;
};

const Reveal = ({children,delay=0,style={},direction="up"}) => {
  const ref = useRef(null);
  useEffect(()=>{
    if(typeof gsap==="undefined"||!ref.current)return;
    const dirs={up:{y:40},down:{y:-40},left:{x:-50},right:{x:50}};
    const from={opacity:0,...dirs[direction]};
    gsap.fromTo(ref.current,from,{opacity:1,x:0,y:0,duration:0.85,delay,ease:"power3.out",scrollTrigger:{trigger:ref.current,start:"top 88%",toggleActions:"play none none none"}});
  },[]);
  return <div ref={ref} style={{...style}}>{children}</div>;
};
